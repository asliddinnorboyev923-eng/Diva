kind = "web"
previewPath = "/"
title = "CleanPro - Furniture & Carpet Cleaning"
version = "1.0.0"
id = "artifacts/cleaning-service"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19171

[services.development]
run = "pnpm --filter @workspace/cleaning-service run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cleaning-service", "run", "build" ]
publicDir = "artifacts/cleaning-service/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19171"
BASE_PATH = "/"
